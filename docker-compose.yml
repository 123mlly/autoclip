services:
  redis:
    image: redis:7-alpine
    container_name: autoclip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 主应用：API + 前端静态资源（同源 :8000）
  # 各服务共用同一镜像名，避免重复构建/导出
  autoclip:
    image: autoclip:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - RUNNING_IN_DOCKER=true
      - DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    image: autoclip:local
    container_name: autoclip-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - RUNNING_IN_DOCKER=true
      - DEBUG=false
      - LOG_LEVEL=INFO
    command: >
      celery -A backend.core.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q processing,upload,notification,maintenance,video,celery
    depends_on:
      redis:
        condition: service_healthy
      autoclip:
        condition: service_healthy

  celery-beat:
    image: autoclip:local
    container_name: autoclip-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
      - RUNNING_IN_DOCKER=true
      - DEBUG=false
      - LOG_LEVEL=INFO
    command: celery -A backend.core.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      autoclip:
        condition: service_healthy

  # 可选监控：docker compose --profile monitoring up -d
  flower:
    profiles: ["monitoring"]
    image: autoclip:local
    container_name: autoclip-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/autoclip.db
      - ENVIRONMENT=production
    command: celery -A backend.core.celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: autoclip-network
